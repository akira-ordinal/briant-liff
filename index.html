// ── LINE Messaging API で診断結果を送信 ────────────
async function sendToLine(userId, resultData, ls, wr, st) {
  const res = await fetch(`${API_BASE}/api/send-line`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      userId,
      vision: resultData.vision,
      message: resultData.message,
      lifestyle: ls,
      worry: wr,
      stress: st
    })
  });
  if (!res.ok) throw new Error('LINE送信失敗');
  return res.json();
}

// ── 診断メイン ────────────────────────────────────
async function diagnose() {
  const ls = parseInt(document.getElementById('lifestyle').value);
  const wr = parseInt(document.getElementById('worry').value);
  const st = parseInt(document.getElementById('stress').value);
  const data = db[`${ls}-${wr}-${st}`] || db["0-0-1"];
  const key = `${ls}-${wr}-${st}`;
  const imgSrc = getCharacterImage(key);
  const charName = characterNames[key] || '';
  const panel = document.getElementById('rightPanel');
  const btn = document.getElementById('diagnoseBtn');

  btn.disabled = true;
  panel.innerHTML = '<div class="loader"><div class="spinner"></div><span>🔮 解析中...</span></div>';

  // 1.4秒後に結果を表示し、同時にLINE送信
  setTimeout(async () => {
    panel.innerHTML = `
      <div class="result">
        <img class="result-img" src="${imgSrc}" alt="カウンセリングイメージ" onerror="this.style.display='none'">
        ${charName ? `<p class="result-char">${charName} タイプ</p>` : ''}
        <p class="result-tag">🔮 10年後の未来予測</p>
        <div class="result-vision">${data.vision}</div>
        <div class="result-message">💬 ${data.message}</div>
        <div class="result-cta">
          <p>自分を後回しにするのは、卒業。</p>
          <a href="${RESERVE_URL}" target="_blank" class="cta-btn">特別体験コースを予約する</a>
        </div>
        <div class="line-status sending" id="lineStatus">
          <span class="spinner-sm"></span>
          <span>LINEトークにカウンセリング結果を送信中…</span>
        </div>
      </div>`;

    btn.disabled = false;

    // LINE送信
    if (lineUserId) {
      try {
        await sendToLine(lineUserId, data, ls, wr, st);
        document.getElementById('lineStatus').className = 'line-status';
        document.getElementById('lineStatus').innerHTML = '✅ LINEトークにカウンセリング結果をお送りしました！';
      } catch (e) {
        console.error(e);
        document.getElementById('lineStatus').className = 'line-status error';
        document.getElementById('lineStatus').innerHTML = '⚠️ LINE送信に失敗しました。再度お試しください。';
      }
    } else {
      // LIFF外（ブラウザプレビュー）ではLINE送信をスキップ
      document.getElementById('lineStatus').className = 'line-status';
      document.getElementById('lineStatus').innerHTML = '💡 LINEアプリから開くとトークに結果が届きます';
    }
  }, 1400);
}
